name: Release native binaries

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset-name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset-name: aichat-windows-x64
            gradle: .\gradlew.bat
            binary: build\native\nativeCompile\aichat.exe
            package-command: Compress-Archive -Path build\native\nativeCompile\aichat.exe -DestinationPath aichat-windows-x64.zip -Force
            package-path: aichat-windows-x64.zip
          - os: ubuntu-latest
            asset-name: aichat-linux-x64
            gradle: ./gradlew
            binary: build/native/nativeCompile/aichat
            package-command: tar -czf aichat-linux-x64.tar.gz -C build/native/nativeCompile aichat
            package-path: aichat-linux-x64.tar.gz
          - os: macos-14
            asset-name: aichat-macos-arm64
            gradle: ./gradlew
            binary: build/native/nativeCompile/aichat
            package-command: tar -czf aichat-macos-arm64.tar.gz -C build/native/nativeCompile aichat
            package-path: aichat-macos-arm64.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Set up MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run tests
        run: ${{ matrix.gradle }} test

      - name: Build native binary
        run: ${{ matrix.gradle }} nativeCompile

      - name: Package native binary
        run: ${{ matrix.package-command }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: ${{ matrix.package-path }}
          if-no-files-found: error

  release:
    name: Upload binaries to GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Download native binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag from project version
        run: |
          set -euo pipefail

          project_version="$(./gradlew -q printProjectVersion | tail -n 1 | xargs)"
          tag_name="v$project_version"

          if [ -z "$project_version" ]; then
            echo "::error::Project version is empty."
            exit 1
          fi

          if ! printf '%s' "$tag_name" | grep -Eq '^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::Project version '$project_version' is invalid. Use a version like 1.11.0."
            exit 1
          fi

          echo "TAG_NAME=$tag_name" >> "$GITHUB_ENV"
          echo "Resolved release tag: $tag_name"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "AIChatApp $TAG_NAME" --target "$GITHUB_SHA"
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --title "AIChatApp $TAG_NAME" --generate-notes --target "$GITHUB_SHA"
          fi
